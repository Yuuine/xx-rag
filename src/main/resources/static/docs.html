<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已上传文档列表</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/docs.css">
</head>
<body>
<div class="container">
    <header class="header-with-close">
        <h1>已上传文档列表</h1>
        <button class="close-btn" onclick="window.close()" title="关闭">×</button>
    </header>
    <div class="list">
        <div class="batch-actions">
            <div class="batch-left">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="selectAll" style="width: 18px; height: 18px;">
                    <span>全选</span>
                </label>
                <button class="batch-delete-btn" id="batchDeleteBtn" disabled>批量删除</button>
            </div>
            <div id="docCount" class="doc-count-display">
                <span id="totalCount">0</span> 个文档
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文档名称...">
                <button id="searchBtn">搜索</button>
            </div>
        </div>
        <table id="docTable">
            <thead>
            <tr>
                <th style="width: 50px;"></th>
                <th>文档名称</th>
                <th style="width: 180px;">创建时间</th>
                <th style="width: 80px;">操作</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="emptyMsg" class="empty" style="display: none;">暂无上传文档</div>
        <div id="noResultsMsg" class="no-results">无匹配文档</div>

        <div id="paginationControls" class="pagination-controls" style="display: none;">
            <button id="prevPage" class="page-btn">上一页</button>

            <div class="page-numbers" id="pageNumbers"></div>

            <button id="nextPage" class="page-btn">下一页</button>
        </div>
    </div>
</div>

<div class="modal" id="confirmModal">
    <div class="modal-content">
        <h3>确认删除</h3>
        <p id="modalMessage">确定要删除选中的文档吗？<br>删除后无法恢复！</p>
        <div class="modal-buttons">
            <button class="modal-btn modal-cancel" id="cancelDelete">取消</button>
            <button class="modal-btn modal-confirm" id="confirmDelete">确认删除</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/common.js"></script>
<script src="js/docs.js" defer></script>
</body>
</html>
