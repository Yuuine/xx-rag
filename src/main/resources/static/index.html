<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潇潇知识助手</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
<div class="chat-card">
    <header>
        潇潇知识助手
        <div class="header-controls">
            <div class="time-toggle-wrapper">
                <input type="checkbox" id="timeToggle" class="time-toggle-checkbox">
                <label for="timeToggle" class="time-toggle-label"></label>
                <span class="time-toggle-text on">ON</span>
                <span class="time-toggle-text off">OFF</span>
            </div>
            <button class="upload-trigger" id="viewDocsTrigger" title="查看文档" aria-label="查看文档">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
            </button>
            <button class="upload-trigger" id="newSessionBtn" title="清除会话" aria-label="清除会话">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-12 0 9 9 0 0 1 12 0"></path>
                </svg>
            </button>
            <button class="upload-trigger" id="cleanupBtn" title="清理旧记录" aria-label="清理旧记录">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </button>
            <button class="upload-trigger" id="uploadTrigger" title="上传文档" aria-label="上传文档">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </button>
        </div>
    </header>
    <div class="chat-container">
        <div id="messagesContainer"></div>
        <div class="input-section">
            <textarea id="questionInput" placeholder="输入问题，按 Enter 发送（Shift+Enter 换行）..." rows="1"></textarea>
            <button id="sendBtn" class="btn-send">发送</button>
        </div>
    </div>
    <div class="upload-modal" id="uploadModal">
        <h3>上传文档</h3>
        <div class="upload-area" id="uploadArea">
            <p>支持 PDF、Word、TXT、Markdown、Excel 等格式</p>
            <p style="font-size: 0.85em; color: var(--text-muted);">拖拽文件到此处或点击选择</p>
            <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.txt,.md,.xls,.xlsx">
        </div>
        <button id="uploadBtn" class="btn-upload">上传文件</button>
    </div>
</div>

<div id="confirmModal" class="modal" aria-hidden="true">
    <div class="modal-content">
        <div id="confirmModalMessage">确认操作？</div>
        <div id="confirmModalInputWrapper" style="margin-top:12px; display:none;">
            <input id="confirmModalInput" type="number" min="1" placeholder="天数，例如 30"
                   style="width:100%; padding:10px; box-sizing:border-box; border-radius:8px; border:1px solid var(--border-input);">
        </div>
        <div id="confirmModalCheckboxWrapper" style="margin-top:12px; display:none; text-align:left;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" id="confirmModalCheckbox" style="width:18px; height:18px;">
                <span>全部删除（删除整个会话）</span>
            </label>
        </div>
        <div id="confirmModalPasswordWrapper" style="margin-top:12px; display:none;">
            <input id="confirmModalPassword" type="password" placeholder="请输入管理员密码"
                   style="width:100%; padding:10px; box-sizing:border-box; border-radius:8px; border:1px solid var(--border-input);">
        </div>
        <div class="modal-buttons">
            <button id="confirmModalCancel" class="modal-btn modal-cancel">取消</button>
            <button id="confirmModalConfirm" class="modal-btn modal-confirm">确定</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<div class="drag-overlay" id="dragOverlay">
    <div class="drag-overlay-content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <p>释放文件以上传</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
<script src="js/common.js"></script>
<script src="js/chat.js" defer></script>
</body>
</html>
